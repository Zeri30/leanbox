name: Frontend CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        # `npm install` (not `npm ci`): the lockfile is authored on Windows, and
        # Tailwind v4 / lightningcss / SWC pull different per-platform native
        # optional deps on Linux, which `npm ci` refuses to reconcile. `npm install`
        # honours the lock and resolves the platform optionals.
        run: npm install --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Build (type-checks + compiles)
        run: npm run build
