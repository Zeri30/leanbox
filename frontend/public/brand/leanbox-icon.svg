<svg viewBox="0 0 140 140" width="140" height="140" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="lGrad" x1="15" y1="15" x2="125" y2="125" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#A7F3D0"/>
      <stop offset="45%"  stop-color="#22C55E"/>
      <stop offset="100%" stop-color="#052E0F"/>
    </linearGradient>
    <linearGradient id="boxGrad" x1="43" y1="15" x2="125" y2="97" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#86EFAC"/>
      <stop offset="100%" stop-color="#16A34A"/>
    </linearGradient>
    <linearGradient id="sheen" x1="15" y1="15" x2="65" y2="75" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="white" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <filter id="bloom" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="dropShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#22C55E" flood-opacity="0.4"/>
    </filter>
    <clipPath id="bc"><rect x="43" y="15" width="82" height="82"/></clipPath>
  </defs>

  <g filter="url(#bloom)" opacity="0.65">
    <rect x="15" y="15" width="28" height="110" rx="9" fill="#22C55E"/>
    <rect x="15" y="97" width="110" height="28" rx="9" fill="#22C55E"/>
    <rect x="43" y="15" width="82" height="82" fill="none" stroke="#22C55E" stroke-width="5"/>
  </g>
  <g filter="url(#dropShadow)">
    <rect x="15" y="15" width="28" height="110" rx="9" fill="#22C55E"/>
  </g>
  <rect x="44" y="16" width="80" height="80" fill="#030a03"/>
  <rect x="15" y="15" width="28" height="110" rx="9" fill="url(#lGrad)"/>
  <rect x="15" y="97" width="110" height="28" rx="9" fill="url(#lGrad)"/>
  <rect x="15" y="97" width="28" height="20" fill="url(#lGrad)"/>
  <rect x="43" y="15" width="82" height="82" fill="none" stroke="url(#boxGrad)" stroke-width="5"/>
  <g clip-path="url(#bc)">
    <line x1="43" y1="15" x2="125" y2="97" stroke="url(#boxGrad)" stroke-width="4.5" stroke-linecap="round"/>
    <line x1="125" y1="15" x2="43" y2="97" stroke="url(#boxGrad)" stroke-width="4.5" stroke-linecap="round"/>
  </g>
  <rect x="15" y="15" width="28" height="110" rx="9" fill="url(#sheen)"/>
  <rect x="15" y="97" width="110" height="28" rx="9" fill="url(#sheen)"/>
</svg>
