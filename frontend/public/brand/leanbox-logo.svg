<svg viewBox="0 0 500 130" width="500" height="130" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Depth gradient: mint highlight → site green → deep forest shadow -->
    <linearGradient id="lGrad" x1="15" y1="15" x2="125" y2="115" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#A7F3D0"/>
      <stop offset="42%"  stop-color="#22C55E"/>
      <stop offset="100%" stop-color="#052E0F"/>
    </linearGradient>
    <!-- Box/X stroke: bright lit top → deeper green bottom -->
    <linearGradient id="boxGrad" x1="43" y1="15" x2="125" y2="97" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#86EFAC"/>
      <stop offset="100%" stop-color="#16A34A"/>
    </linearGradient>
    <!-- Gloss sheen: white diagonal highlight, top-left only -->
    <linearGradient id="sheen" x1="15" y1="15" x2="65" y2="75" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="white" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <!-- Wordmark: white top, cool grey bottom -->
    <linearGradient id="wordGrad" x1="0" y1="35" x2="0" y2="85" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#C8C8C8"/>
    </linearGradient>
    <!-- Ambient green bloom -->
    <filter id="bloom" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="11" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Grounding drop shadow -->
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#22C55E" flood-opacity="0.35"/>
    </filter>
    <clipPath id="bc"><rect x="43" y="15" width="82" height="82"/></clipPath>
  </defs>

  <!-- 1. Bloom glow behind mark -->
  <g filter="url(#bloom)" opacity="0.7">
    <rect x="15" y="15" width="28" height="100" rx="9" fill="#22C55E"/>
    <rect x="15" y="87" width="110" height="28" rx="9" fill="#22C55E"/>
    <rect x="15" y="87" width="28" height="17" fill="#22C55E"/>
    <rect x="43" y="15" width="82" height="82" fill="none" stroke="#22C55E" stroke-width="4.5"/>
  </g>

  <!-- 2. Drop shadow -->
  <g filter="url(#dropShadow)">
    <rect x="15" y="15" width="28" height="100" rx="9" fill="#22C55E"/>
    <rect x="15" y="87" width="110" height="28" rx="9" fill="#22C55E"/>
    <rect x="15" y="87" width="28" height="17" fill="#22C55E"/>
  </g>

  <!-- 3. Dark box interior (depth) -->
  <rect x="44" y="16" width="80" height="80" fill="#030a03"/>

  <!-- 4. L shape with depth gradient -->
  <rect x="15" y="15" width="28" height="100" rx="9" fill="url(#lGrad)"/>
  <rect x="15" y="87" width="110" height="28" rx="9" fill="url(#lGrad)"/>
  <rect x="15" y="87" width="28" height="17" fill="url(#lGrad)"/>

  <!-- 5. Box outline + X diagonals -->
  <rect x="43" y="15" width="82" height="82" fill="none" stroke="url(#boxGrad)" stroke-width="4" stroke-linejoin="miter"/>
  <g clip-path="url(#bc)">
    <line x1="43" y1="15" x2="125" y2="97" stroke="url(#boxGrad)" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="125" y1="15" x2="43" y2="97" stroke="url(#boxGrad)" stroke-width="3.5" stroke-linecap="round"/>
  </g>

  <!-- 6. Gloss sheen on L -->
  <rect x="15" y="15" width="28" height="100" rx="9" fill="url(#sheen)"/>
  <rect x="15" y="87" width="110" height="28" rx="9" fill="url(#sheen)"/>

  <!-- Divider -->
  <line x1="150" y1="23" x2="150" y2="107" stroke="#1e1e1e" stroke-width="1"/>

  <!-- Wordmark -->
  <text x="167" y="72"
    font-family="'Helvetica Neue','Arial Black',Arial,sans-serif"
    font-size="44"
    font-weight="800"
    letter-spacing="4"
    fill="url(#wordGrad)">LEANBOX</text>

  <!-- Tagline -->
  <text x="170" y="97"
    font-family="'Helvetica Neue',Arial,sans-serif"
    font-size="10.5"
    font-weight="300"
    letter-spacing="7.5"
    fill="#383838">FITNESS · NUTRITION</text>
</svg>
